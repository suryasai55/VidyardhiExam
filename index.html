<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidyardhi · Entrance Exam 2025–26</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;}

:root{
  --blue:#2563eb;
  --indigo:#4f46e5;
  --blue-light:#dbeafe;
  --gold:#d97706;
  --gold-light:#fef3c7;
  --text:#0f1629;
  --text2:#3d4a6b;
  --muted:#7a87a8;
  --border:#e2e6f0;
  --glass:rgba(255,255,255,0.75);
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

/* ── SLIDE CONTAINER ── */
.slides{
  width:100%;height:100%;
  position:relative;
}

/* ── EACH SLIDE ── */
.slide{
  position:absolute;inset:0;
  width:100%;height:100%;
  opacity:0;
  pointer-events:none;
  transition:opacity .0s;
  overflow:hidden;
}
.slide.active{
  opacity:1;
  pointer-events:all;
}

/* ════════════════════════════
   SLIDE 0 — HERO / COVER
════════════════════════════ */
#slide-0{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 70% 55% at 15% 10%, #bfdbfe55 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 85% 10%, #c7d2fe44 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 50% 100%, #fde68a22 0%, transparent 55%),
    linear-gradient(160deg,#f0f5ff 0%,#f8f9fc 50%,#fdfcff 100%);
  text-align:center;
  padding:40px 24px;
}

/* floating orbs cover slide */
.orb{
  position:absolute;border-radius:50%;pointer-events:none;
  filter:blur(70px);opacity:.45;animation:orbDrift ease-in-out infinite alternate;
}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#bfdbfe,transparent 70%);top:-120px;left:-100px;animation-duration:18s;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#c7d2fe,transparent 70%);bottom:-80px;right:-80px;animation-duration:22s;animation-delay:-7s;}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#fde68a44,transparent 70%);top:40%;right:5%;animation-duration:15s;animation-delay:-4s;}
@keyframes orbDrift{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(30px,-25px) scale(1.07)}
  100%{transform:translate(-15px,35px) scale(.95)}
}

.cover-inner{position:relative;z-index:2;max-width:700px;}

.cover-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.8);
  border:1px solid rgba(37,99,235,.2);
  backdrop-filter:blur(16px);
  padding:8px 20px;border-radius:100px;
  font-size:11px;letter-spacing:4px;text-transform:uppercase;font-weight:700;
  color:var(--blue);
  margin-bottom:30px;
  box-shadow:0 4px 20px rgba(37,99,235,.1),inset 0 1px 0 #fff;
  animation:fadeUp .7s var(--ease) .1s both;
}
.badge-dot{
  width:7px;height:7px;border-radius:50%;background:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.2);
  animation:dotPulse 2s ease infinite;
}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(.75)}}

.cover-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(3.2rem,8vw,6.5rem);
  font-weight:700;line-height:1.02;letter-spacing:-2px;
  color:var(--text);
  animation:fadeUp .8s var(--ease) .18s both;
}
.cover-title em{
  font-style:italic;font-weight:400;
  background:linear-gradient(135deg,var(--blue),var(--indigo));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.cover-sub{
  margin-top:16px;font-size:16px;color:var(--muted);letter-spacing:.3px;
  animation:fadeUp .8s var(--ease) .25s both;
}

.cover-divider{
  width:60px;height:2px;margin:28px auto;
  background:linear-gradient(90deg,var(--blue),var(--indigo));
  border-radius:2px;
  animation:fadeUp .8s var(--ease) .3s both;
}

.cover-stats{
  display:flex;justify-content:center;gap:36px;flex-wrap:wrap;
  animation:fadeUp .8s var(--ease) .36s both;
}
.cstat{display:flex;flex-direction:column;align-items:center;gap:4px;}
.cstat-val{
  font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;
  background:linear-gradient(135deg,var(--blue),var(--indigo));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.cstat-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}

.cover-cta{
  margin-top:42px;
  animation:fadeUp .8s var(--ease) .44s both;
}
.cta-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--blue),var(--indigo));
  color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:600;letter-spacing:.2px;
  padding:16px 36px;border-radius:100px;border:none;
  cursor:pointer;
  box-shadow:0 8px 32px rgba(37,99,235,.35);
  transition:all .3s var(--ease);
  position:relative;overflow:hidden;
}
.cta-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.cta-btn:hover::before{transform:translateX(100%);}
.cta-btn:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(37,99,235,.4);}
.cta-btn:active{transform:translateY(0);}
.cta-arrow{font-size:18px;transition:transform .3s;}
.cta-btn:hover .cta-arrow{transform:translateX(4px);}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* ════════════════════════════
   STUDENT SLIDES
════════════════════════════ */
.student-slide{
  display:flex;
  width:100%;height:100%;
}

/* Left — photo half */
.s-photo{
  flex:0 0 48%;
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#e2e8f8,#c7d2fe55);
}
.s-photo-img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  opacity:0;
  transition:opacity .6s var(--ease),transform .6s var(--ease);
  transform:scale(1.06);
}
.s-photo-img.loaded{opacity:1;transform:scale(1);}

/* Photo skeleton */
.s-photo-skel{
  position:absolute;inset:0;
  background:linear-gradient(90deg,#edf2ff 25%,#dbeafe 50%,#edf2ff 75%);
  background-size:300% 100%;
  animation:skel 1.6s ease infinite;
}
@keyframes skel{0%{background-position:100% 0}100%{background-position:-100% 0}}
.s-photo.img-loaded .s-photo-skel{opacity:0;}

/* Overlay gradient on photo — fades into right panel */
.s-photo::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:80px;
  background:linear-gradient(to right,transparent,rgba(248,249,252,.95));
  pointer-events:none;z-index:2;
}

/* Student number watermark on photo */
.s-num-watermark{
  position:absolute;bottom:20px;left:24px;z-index:3;
  font-family:'Playfair Display',serif;
  font-size:5rem;font-weight:700;line-height:1;
  color:rgba(255,255,255,.18);
  pointer-events:none;
  text-shadow:0 2px 20px rgba(0,0,0,.1);
}

/* Photo error */
.s-photo-err{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#eef2ff,#dbeafe);
}
.s-photo-err .e-icon{font-size:48px;opacity:.4;}
.s-photo-err .e-txt{font-size:13px;color:var(--muted);letter-spacing:.3px;}

/* Right — details half */
.s-details{
  flex:1;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%,#dbeafe33 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%,#e0e7ff22 0%,transparent 55%),
    #f8f9fc;
  display:flex;flex-direction:column;justify-content:center;
  padding:48px 52px 48px 56px;
  position:relative;overflow:hidden;
}

/* Right side faint top border */
.s-details::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--blue),var(--indigo),transparent);
}

/* Glass card sitting inside details */
.s-detail-card{
  background:rgba(255,255,255,.75);
  border:1px solid rgba(255,255,255,.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:24px;
  padding:36px 38px;
  box-shadow:0 8px 40px rgba(15,22,41,.07),0 2px 8px rgba(15,22,41,.04),inset 0 1px 0 #fff;
  position:relative;overflow:hidden;
}
.s-detail-card::before{
  content:'';position:absolute;top:0;left:20%;right:20%;
  height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);
}

.s-order{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--blue);font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.s-order::before{
  content:'';width:24px;height:2px;background:var(--blue);border-radius:2px;
}

.s-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.9rem,3.5vw,2.8rem);
  font-weight:700;line-height:1.1;letter-spacing:-.5px;
  color:var(--text);
}

.s-divider{
  width:40px;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--indigo));
  border-radius:2px;margin:18px 0;
}

.s-info-list{display:flex;flex-direction:column;gap:12px;}

.s-info-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:rgba(37,99,235,.04);
  border:1px solid rgba(37,99,235,.08);
  border-radius:14px;
  transition:background .25s,border-color .25s;
}
.s-info-row:hover{background:rgba(37,99,235,.07);border-color:rgba(37,99,235,.14);}

.s-info-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--blue-light),#e0e7ff);
  border:1px solid rgba(37,99,235,.12);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  flex-shrink:0;
}
.s-info-content{display:flex;flex-direction:column;gap:2px;}
.s-info-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.s-info-value{font-size:14.5px;font-weight:600;color:var(--text);}

.s-class-tag{
  margin-top:20px;
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--gold-light),#fde68a55);
  border:1px solid rgba(217,119,6,.2);
  border-radius:12px;padding:8px 18px;
  color:var(--gold);font-size:13px;font-weight:700;letter-spacing:.3px;
}

/* ── NAVIGATION BAR ── */
.nav-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 48px 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to top,rgba(248,249,252,.98) 60%,transparent);
  z-index:10;
}

.nav-btn{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.9);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  border-radius:100px;padding:12px 26px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13.5px;font-weight:600;color:var(--text2);
  cursor:pointer;
  box-shadow:0 4px 16px rgba(15,22,41,.06),inset 0 1px 0 #fff;
  transition:all .3s var(--ease);
}
.nav-btn:hover{
  background:#fff;color:var(--text);
  box-shadow:0 8px 28px rgba(15,22,41,.1),inset 0 1px 0 #fff;
  transform:translateY(-2px);
}
.nav-btn:active{transform:translateY(0);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}

.nav-btn.next{
  background:linear-gradient(135deg,var(--blue),var(--indigo));
  border:none;color:#fff;
  box-shadow:0 6px 24px rgba(37,99,235,.35);
}
.nav-btn.next:hover{
  box-shadow:0 12px 36px rgba(37,99,235,.45);
  background:linear-gradient(135deg,#1d4ed8,#4338ca);
}

/* Progress dots */
.nav-progress{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.progress-text{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.3px;}
.progress-bar-wrap{width:160px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--indigo));border-radius:3px;transition:width .4s var(--ease);}

/* ── COVER NAV ── */
.cover-nav{
  position:absolute;bottom:28px;right:40px;
  display:flex;align-items:center;gap:12px;z-index:10;
}

/* ── SLIDE TRANSITION ── */
.slide{transition:none;}
.slide.enter-right{animation:slideInRight .45s var(--ease) both;}
.slide.enter-left {animation:slideInLeft  .45s var(--ease) both;}
.slide.exit-right {animation:slideOutLeft .45s var(--ease) both;}
.slide.exit-left  {animation:slideOutRight .45s var(--ease) both;}

@keyframes slideInRight {from{opacity:0;transform:translateX(60px)}  to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft  {from{opacity:0;transform:translateX(-60px)} to{opacity:1;transform:translateX(0)}}
@keyframes slideOutLeft {from{opacity:1;transform:translateX(0)}  to{opacity:0;transform:translateX(-60px)}}
@keyframes slideOutRight{from{opacity:1;transform:translateX(0)}  to{opacity:0;transform:translateX(60px)}}

/* ── KEYBOARD HINT ── */
.kb-hint{
  position:absolute;bottom:88px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(122,135,168,.55);letter-spacing:.5px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  animation:fadeUp .8s .6s both,hintFade 3s 3s ease forwards;
  pointer-events:none;z-index:5;
}
@keyframes hintFade{to{opacity:0}}
.kb-key{
  background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.1);
  border-radius:5px;padding:2px 8px;font-size:10px;font-weight:600;color:var(--text2);
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .student-slide{flex-direction:column;}
  .s-photo{flex:0 0 42%;width:100%;}
  .s-photo::after{
    top:auto;left:0;right:0;bottom:0;width:auto;height:60px;
    background:linear-gradient(to bottom,transparent,rgba(248,249,252,.97));
  }
  .s-details{padding:24px 20px 80px;}
  .s-detail-card{padding:22px 20px;}
  .s-name{font-size:1.6rem;}
  .nav-bar{padding:14px 20px 20px;}
  .nav-btn{padding:10px 18px;font-size:12.5px;}
  .cover-title{font-size:2.8rem;letter-spacing:-1px;}
  .s-num-watermark{font-size:3rem;}
}

/* ── PHOTO VIEW BTN (bottom center of image) ── */
.s-photo-view-btn{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  z-index:5;
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.88);
  border:1px solid rgba(255,255,255,.95);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-radius:100px;
  padding:10px 22px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;font-weight:600;
  color:var(--text2);
  cursor:pointer;
  box-shadow:0 6px 24px rgba(15,22,41,.14),inset 0 1px 0 #fff;
  transition:all .3s var(--ease);
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  animation:none;
}
.s-photo-view-btn .vb-icon{font-size:15px;transition:transform .3s var(--ease);}
.s-photo.img-loaded .s-photo-view-btn{
  opacity:1;pointer-events:all;
  animation:btnSlideUp .45s var(--spring) .3s both;
}
@keyframes btnSlideUp{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.s-photo-view-btn:hover{
  background:#fff;
  color:var(--blue);
  box-shadow:0 10px 36px rgba(37,99,235,.2),inset 0 1px 0 #fff;
  transform:translateX(-50%) translateY(-2px);
}
.s-photo-view-btn:hover .vb-icon{transform:scale(1.2);}
.s-photo-view-btn:active{transform:translateX(-50%) translateY(0);}

/* ── FULLSCREEN MODAL ── */
.fs-modal{
  display:none;position:fixed;inset:0;z-index:99999;
  align-items:center;justify-content:center;flex-direction:column;
  padding:20px;
}
.fs-modal.open{
  display:flex;
  animation:fsBgIn .3s ease forwards;
}
@keyframes fsBgIn{to{background:rgba(10,14,30,.92);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);}}

.fs-img-wrap{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.1);
  animation:fsImgIn .38s var(--spring) both;
  max-width:90vw;max-height:80vh;
}
@keyframes fsImgIn{from{opacity:0;transform:scale(.82) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}

.fs-img{
  display:block;
  max-width:90vw;max-height:80vh;
  object-fit:contain;
  border-radius:20px;
}

.fs-info{
  margin-top:20px;text-align:center;
  animation:fadeUp .35s var(--ease) .15s both;
}
.fs-name{
  font-family:'Playfair Display',serif;
  font-size:1.6rem;font-weight:700;color:#fff;letter-spacing:-.3px;
}
.fs-village{color:rgba(147,197,253,1);font-size:14px;margin-top:5px;font-weight:500;}
.fs-meta{color:rgba(255,255,255,.3);font-size:11.5px;margin-top:3px;letter-spacing:.4px;}

.fs-close{
  position:fixed;top:18px;right:22px;
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(10px);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  transition:all .25s var(--ease);z-index:100000;
}
.fs-close:hover{background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.4);transform:scale(1.1) rotate(90deg);}

.fs-hint{
  position:fixed;bottom:18px;
  font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.5px;
}
</style>
</head>
<body>

<div class="slides" id="slides">

  <!-- ══ SLIDE 0: COVER ══ -->
  <div class="slide active" id="slide-0">
    <div class="orb orb1"></div>

    <div class="cover-inner">

      </div>
      <div class="cover-cta">
        <button class="cta-btn" onclick="goTo(1)">
          View Students <span class="cta-arrow">→</span>

    <div class="kb-hint">
      <span class="kb-key">←</span><span class="kb-key">→</span> arrow keys or swipe to navigate
    </div>
  </div>

  <!-- student slides generated by JS -->
</div>

const students=[

/* ── NAVIGATION ── */
function goTo(idx){
  if(isAnimating||idx<0||idx>=total||idx===current)return;
  isAnimating=true;

  const dir=idx>current?'right':'left';
  const oldSlide=document.getElementById('slide-'+current);
  const newSlide=document.getElementById('slide-'+idx);

  /* exit old */
  oldSlide.classList.add(dir==='right'?'exit-right':'exit-left');
  oldSlide.addEventListener('animationend',()=>{
    oldSlide.classList.remove('active','exit-right','exit-left');
  },{once:true});

  /* enter new */
  newSlide.classList.add('active',dir==='right'?'enter-right':'enter-left');
  newSlide.addEventListener('animationend',()=>{
    newSlide.classList.remove('enter-right','enter-left');
    isAnimating=false;
  },{once:true});

  current=idx;
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(current+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')   goTo(current-1);
});

/* ── SWIPE TOUCH ── */
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{
  const dx=tx-e.changedTouches[0].clientX;
  if(Math.abs(dx)>50){dx>0?goTo(current+1):goTo(current-1);}
},{passive:true});

/* ── Fullscreen modal ── */
function fsOpen(src,name,village){
  document.getElementById('fsImg').src=src;
  document.getElementById('fsName').textContent=name;
  document.getElementById('fsVillage').textContent='📍 '+village;
  document.getElementById('fsModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function fsClose(){
  document.getElementById('fsModal').classList.remove('open');
  document.body.style.overflow='';
}
function fsCloseOut(e){if(e.target===document.getElementById('fsModal'))fsClose();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')fsClose();});
</script>
